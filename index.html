<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Můj ToDo List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Můj Seznam Úkolů</h1>
        <p>Zadej, co musíš udělat, a klikni na tlačítko.</p>

        <input type="text" id="userInput" placeholder="Napiš úkol...">
        
        <button id="testButton">Přidat úkol</button>

        <div id="result">
            <p>Zatím nemáš žádné úkoly.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
